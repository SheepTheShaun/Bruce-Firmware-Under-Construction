[env:ESP32-DIV-V2-0]
board = ESP32-DIV-V2.0
board_build.partitions = custom_8Mb.csv
build_src_filter = ${env.build_src_filter} +<../boards/ESP32-DIV-V2.0>
build_flags =
        ${env.build_flags}
        -Iboards/ESP32-DIV-V2.0
        -Os
        -DCORE_DEBUG_LEVEL=5
        -DUSER_SETUP_LOADED=1
        -DILI9341_DRIVER=1
        -DTFT_MISO=37
        -DTFT_MOSI=35
        -DTFT_SCLK=36
        -DTFT_CS=17
        -DTFT_DC=16
        -DTFT_RST=-1
        -DTFT_BL=7
        -DTOUCH_CS=18
        -DHAS_SCREEN=1
        -DROTATION=1
        -DSMOOTH_FONT=1
        -DSPI_FREQUENCY=40000000
        -DSPI_READ_FREQUENCY=20000000
        -DSPI_TOUCH_FREQUENCY=2500000
lib_deps =
        ${env.lib_deps}
